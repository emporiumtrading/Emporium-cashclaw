# fly.toml app configuration file generated for emporium-melista on 2026-04-02T13:05:27-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'emporium-melista'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3777
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "melista_data"
  destination = "/data"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
